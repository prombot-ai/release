name: Aggregate PromBot CLI and Desktop releases

# When a release is published here, attach the latest assets from the CLI and
# Desktop repos (same patterns as their release workflows: archives/bundles and
# Windows extras from those pipelines).

on:
  release:
    types:
      - created

jobs:
  aggregate:
    name: Upload latest CLI and Desktop release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.PROMBOT_TOKEN || github.token }}
      CLI_REPO: ${{ format('{0}/cli', github.repository_owner) }}
      DESKTOP_REPO: ${{ format('{0}/desktop', github.repository_owner) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download latest CLI release assets
        run: |
          mkdir -p artifacts/cli
          gh release download --repo "$CLI_REPO" --dir artifacts/cli --pattern '*'

      - name: Download latest Desktop release assets
        run: |
          mkdir -p artifacts/desktop
          gh release download --repo "$DESKTOP_REPO" --dir artifacts/desktop --pattern '*'

      - name: Upload assets to this release
        run: |
          TAG="${{ github.event.release.tag_name }}"
          REPO="${{ github.repository }}"
          find artifacts -type f -print0 | while IFS= read -r -d '' f; do
            gh release upload "$TAG" "$f" --clobber --repo "$REPO"
          done
