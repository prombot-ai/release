name: Aggregate PromBot CLI, Desktop, and App releases

# When a release is published here, build the Android app (EAS, same as the app
# repo), attach the APK, attach the latest assets from the CLI and Desktop repos,
# then refresh README.md with direct latest-release download links.

on:
  release:
    types:
      - created

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-android:
    name: EAS Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/app', github.repository_owner) }}
          ref: ${{ github.event.release.tag_name }}
          token: ${{ secrets.PROMBOT_TOKEN || github.token }}

      - name: Resolve Expo app directory
        run: |
          if [ -f app/package.json ]; then
            echo "EXPO_APP_ROOT=app" >> "$GITHUB_ENV"
          elif [ -f package.json ]; then
            echo "EXPO_APP_ROOT=." >> "$GITHUB_ENV"
          else
            echo "::error::No package.json at repo root or app/. Set up the Expo app or adjust paths."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ env.EXPO_APP_ROOT }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.EXPO_APP_ROOT }}
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Ensure EAS project is linked
        working-directory: ${{ env.EXPO_APP_ROOT }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
        run: |
          set -euo pipefail
          if node -e "const j=require('./app.json'); process.exit(j.expo?.extra?.eas?.projectId ? 0 : 1)"; then
            echo "EAS project ID already present in app.json."
            exit 0
          fi
          if [ -n "${EAS_PROJECT_ID:-}" ]; then
            eas init --non-interactive --id "$EAS_PROJECT_ID" --force
          else
            eas init --non-interactive --force
          fi

      - name: EAS build (Android)
        working-directory: ${{ env.EXPO_APP_ROOT }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        run: eas build --platform android --profile production --non-interactive --wait

      - name: Download Android artifact
        working-directory: ${{ env.EXPO_APP_ROOT }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          OUT="prombot-app-${{ github.event.release.tag_name }}-android.apk"
          JSON=$(eas build:list --platform android --limit 1 --non-interactive --json)
          URL=$(echo "$JSON" | jq -r '.[0].artifacts // {} | .applicationArchiveUrl // .url // .buildUrl // empty')
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "::error::Could not read artifact URL from eas build:list. Raw response:"
            echo "$JSON" | jq .
            exit 1
          fi
          curl -fL --retry 3 --retry-delay 5 -o "$OUT" "$URL"

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PROMBOT_TOKEN || github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ github.workspace }}/${{ env.EXPO_APP_ROOT }}/prombot-app-${{ github.event.release.tag_name }}-android.apk" \
            --clobber --repo "${{ github.repository }}"

  aggregate:
    name: Upload latest CLI and Desktop release assets
    needs: build-android
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROMBOT_TOKEN || github.token }}
      CLI_REPO: ${{ format('{0}/cli', github.repository_owner) }}
      DESKTOP_REPO: ${{ format('{0}/desktop', github.repository_owner) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.PROMBOT_TOKEN || github.token }}

      - name: Download latest CLI release assets
        run: |
          mkdir -p artifacts/cli
          gh release download --repo "$CLI_REPO" --dir artifacts/cli --pattern '*'

      - name: Download latest Desktop release assets
        run: |
          mkdir -p artifacts/desktop
          gh release download --repo "$DESKTOP_REPO" --dir artifacts/desktop --pattern '*'

      - name: Download Android APK from this release
        env:
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/app
          gh release download "$TAG" --repo "$REPO" --dir artifacts/app --pattern 'prombot-app-*-android.apk'

      - name: Upload assets to this release
        run: |
          TAG="${{ github.event.release.tag_name }}"
          REPO="${{ github.repository }}"
          find artifacts/cli artifacts/desktop -type f -print0 | while IFS= read -r -d '' f; do
            gh release upload "$TAG" "$f" --clobber --repo "$REPO"
          done

      - name: Update README with latest release download links
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          LATEST="${REPO_URL}/releases/latest"
          TAG_URL="${REPO_URL}/releases/tag/${RELEASE_TAG}"

          row_cli() {
            local base="$1"
            local url="${REPO_URL}/releases/latest/download/${base}"
            case "$base" in
              *_linux.tar.gz) printf '| Linux | [`%s`](%s) |\n' "$base" "$url" ;;
              *_macos.tar.gz) printf '| macOS | [`%s`](%s) |\n' "$base" "$url" ;;
              *_windows.zip) printf '| Windows | [`%s`](%s) |\n' "$base" "$url" ;;
              *) printf '| | [`%s`](%s) |\n' "$base" "$url" ;;
            esac
          }

          row_desktop() {
            local base="$1"
            local url="${REPO_URL}/releases/latest/download/${base}"
            case "$base" in
              *.deb) printf '| Linux | [`%s`](%s) |\n' "$base" "$url" ;;
              *.dmg) printf '| macOS | [`%s`](%s) |\n' "$base" "$url" ;;
              *.exe) printf '| Windows (portable) | [`%s`](%s) |\n' "$base" "$url" ;;
              *.msi) printf '| Windows (installer) | [`%s`](%s) |\n' "$base" "$url" ;;
              *) printf '| | [`%s`](%s) |\n' "$base" "$url" ;;
            esac
          }

          row_app() {
            local base="$1"
            local url="${REPO_URL}/releases/latest/download/${base}"
            case "$base" in
              *-android.apk) printf '| Android | [`%s`](%s) |\n' "$base" "$url" ;;
              *-ios.ipa) printf '| iOS | [`%s`](%s) |\n' "$base" "$url" ;;
              *) printf '| | [`%s`](%s) |\n' "$base" "$url" ;;
            esac
          }

          {
            echo '# release'
            echo ''
            echo 'PromBot release distribution.'
            echo ''
            echo "**Bundled downloads (this repo):** [Latest release](${LATEST}) · [${RELEASE_TAG}](${TAG_URL})"
            echo ''
            echo '---'
            echo ''
            echo '## PromBot CLI'
            echo ''
            echo '| Platform | Download |'
            echo '|----------|----------|'
            if [[ -n "$(find artifacts/cli -maxdepth 1 -type f -print -quit 2>/dev/null)" ]]; then
              while IFS= read -r f; do
                [[ -n "${f:-}" ]] || continue
                row_cli "$(basename "$f")"
              done < <(find artifacts/cli -maxdepth 1 -type f | sort)
            else
              echo '| | *No CLI artifacts in this run* |'
            fi
            echo ''
            echo '## PromBot Desktop'
            echo ''
            echo '| Platform | Download |'
            echo '|----------|----------|'
            if [[ -n "$(find artifacts/desktop -maxdepth 1 -type f -print -quit 2>/dev/null)" ]]; then
              while IFS= read -r f; do
                [[ -n "${f:-}" ]] || continue
                row_desktop "$(basename "$f")"
              done < <(find artifacts/desktop -maxdepth 1 -type f | sort)
            else
              echo '| | *No Desktop artifacts in this run* |'
            fi
            echo ''
            echo '## PromBot App'
            echo ''
            echo '| Platform | Download |'
            echo '|----------|----------|'
            if [[ -n "$(find artifacts/app -maxdepth 1 -type f -print -quit 2>/dev/null)" ]]; then
              while IFS= read -r f; do
                [[ -n "${f:-}" ]] || continue
                row_app "$(basename "$f")"
              done < <(find artifacts/app -maxdepth 1 -type f | sort)
            else
              echo '| | *No App artifacts in this run* |'
            fi
            echo ''
            echo "For iOS builds and additional app notes, see [${OWNER}/app releases](https://github.com/${OWNER}/app/releases/latest)."
          } > README.md

      - name: Commit README if changed
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "README.md already up to date."
          else
            git commit -m "docs: refresh README download links for ${RELEASE_TAG}"
            git push origin "HEAD:${DEFAULT_BRANCH}"
          fi
